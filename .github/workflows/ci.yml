name: testing

on:
  push:
    branches:
      - master
      - devel
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: astro

      - name: Build
        run: npm run build
        working-directory: astro
