[workspace]
name = "youtube-fetch"
version = "0.1.0"
description = "Fetch YouTube videos and create tutorial posts"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.10"
google-api-python-client = ">=2.108.0"
python-dateutil = ">=2.8.2"
python-dotenv = "*"

[tasks]
fetch = "python fetch_youtube_videos.py"
